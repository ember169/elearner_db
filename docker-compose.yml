services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - db-data:/app/data
    environment:
      - DATABASE_PATH=/app/data/learner.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db-data:
